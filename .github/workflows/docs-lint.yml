name: Lint Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".markdownlint.json"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - ".markdownlint.json"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: |
            README.md
            docs/*.md
