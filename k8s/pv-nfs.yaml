apiVersion: v1
kind: PersistentVolume
metadata:
  name: framory-photos
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadOnlyMany
  nfs:
    server: NAS_IP_ADDRESS
    path: /volume1/photos
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: framory-photos
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 100Gi
  volumeName: framory-photos
  storageClassName: ""
