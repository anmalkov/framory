apiVersion: v1
kind: ConfigMap
metadata:
  name: framory-config
data:
  FRAMORY_PHOTO_ROOT: "/photos"
  FRAMORY_DB_PATH: "/data/framory.db"
  FRAMORY_CACHE_PATH: "/data/cache"
  FRAMORY_TIMEZONE: "Europe/Brussels"
  FRAMORY_PHOTO_MAX_SIZE: "1920"
  FRAMORY_DEFAULT_FOLDER: ""
  FRAMORY_DEFAULT_DELAY_SECONDS: "60"
  FRAMORY_DEFAULT_STOP_TIME: "00:00"
